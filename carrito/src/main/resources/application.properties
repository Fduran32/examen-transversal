spring.application.name=carrito
server.port=8083

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

aws.queue.name=TU_COLA_SQS_AQUI
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
spring.cloud.aws.region.static=us-east-1

jwt.secret=${JWT_SECRET}

# URLs de los otros microservicios, usando el nombre de servicio de docker-compose
# (funcionan dentro de la red "expressnow-network" en cualquier host Linux/EC2, a diferencia de host.docker.internal)
usuarios.service.url=${USUARIOS_SERVICE_URL}
productos.service.url=${PRODUCTOS_SERVICE_URL}